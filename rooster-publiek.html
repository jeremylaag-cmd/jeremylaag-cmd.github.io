<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TC Group — Rooster</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F7F6F2;--surface:#fff;--border:#E5E3DB;--text:#1A1917;--muted:#888580;--radius:10px;--font:'DM Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:50}
.logo{font-size:14px;font-weight:600;letter-spacing:-.02em}
.logo span{color:var(--muted);font-weight:400}
.vbadge{font-size:10px;background:#F0FDF4;color:#166534;border:1px solid #BBF7D0;border-radius:20px;padding:2px 8px;font-weight:500}

/* ── MOBILE LAYOUT (default) ── */
.layout{display:flex;flex-direction:column}
.sidebar{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem}
.main{padding:1rem;display:flex;flex-direction:column;gap:1rem}

/* Agenda compact op mobiel */
.cal-wrap{overflow-x:auto}
.wh{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;min-width:280px}
.wh span{font-size:9px;color:var(--muted);text-align:center;font-weight:500}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;min-width:280px}
.cd{border-radius:8px;padding:5px 2px;text-align:center;border:1px solid transparent;background:var(--bg);min-height:38px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cd.today{background:#EFF6FF;border-color:#BFDBFE}.cd.today .dn{color:#1E40AF;font-weight:600}
.cd.sel{border-color:var(--text);background:#fff}
.cd.has-klus .dr{display:flex;justify-content:center;gap:2px;margin-top:2px}
.dn{font-size:12px;color:var(--text)}
.dot{width:5px;height:5px;border-radius:50%}
.wdiv{grid-column:1/-1;border-top:1px solid var(--border);margin:4px 0}

/* Legenda op mobiel: horizontale chips */
.lgd{margin-top:.875rem}
.lgd-inner{display:flex;flex-wrap:wrap;gap:6px;margin-top:.4rem}
.lgr-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg);-webkit-tap-highlight-color:transparent}
.lgr-btn:active{background:var(--surface)}
.lgr-btn.pers{background:var(--surface)}
.ls{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* Section cards */
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem}
.st{font-size:13px;font-weight:600}
.slabel{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem}

/* Week nav */
.week-nav{display:flex;align-items:center;gap:4px}
.week-nav-label{font-size:11px;color:var(--muted);font-weight:500;min-width:110px;text-align:center}
.btn-nav{background:transparent;border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:14px;cursor:pointer;font-family:var(--font);color:var(--text);line-height:1;-webkit-tap-highlight-color:transparent}
.btn-nav:active{background:var(--bg)}

/* Truck timeline */
.tl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tl-inner{min-width:420px}
.tl-hdr{display:grid;grid-template-columns:70px 1fr;gap:6px;margin-bottom:3px}
.tl-dates{display:grid;grid-template-columns:repeat(14,1fr);gap:2px}
.td{font-size:8px;color:var(--muted);text-align:center;font-weight:500}
.td.tod{color:#1E40AF}
.tl-rows{display:flex;flex-direction:column;gap:3px}
.tl-row{display:grid;grid-template-columns:70px 1fr;gap:6px;align-items:center}
.tl-name{font-size:10px;color:var(--muted);text-align:right;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-cells{display:grid;grid-template-columns:repeat(14,1fr);gap:2px}
.tc{height:22px;border-radius:3px;border:1px solid var(--border);background:var(--bg);cursor:pointer;-webkit-tap-highlight-color:transparent}
.tc.busy{border-width:1px}
.tc.tod-col{outline:2px solid rgba(37,99,235,.25);outline-offset:-1px}
.tc.sel-col{outline:2px solid var(--text);outline-offset:-1px}

/* Klus cards */
.kl{display:flex;flex-direction:column;gap:10px}
.kc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;cursor:pointer;-webkit-tap-highlight-color:transparent;active:opacity:.9}
.kc:active{opacity:.85}
.kdate{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.25rem}
.knaam{font-size:15px;font-weight:600;color:var(--text);margin-bottom:.25rem}
.ktijd{font-size:16px;font-weight:600;color:var(--text);margin-bottom:.4rem}
.ktrucks{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.3rem;align-items:center}
.bdg{display:inline-flex;font-size:10px;padding:3px 8px;border-radius:5px;font-weight:500}
.kmeta{font-size:12px;color:var(--muted)}
.kmeta strong{color:var(--text)}
.soort-wrap{display:inline-flex;align-items:center;gap:0}
.soort-toggle{background:none;border:none;cursor:pointer;padding:0 3px;font-size:10px;color:#4C1D95;line-height:1;font-family:var(--font)}
.soort-desc{display:none;margin-top:5px;font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 9px;font-style:italic;line-height:1.5}
.soort-desc.open{display:block}
.pdf-link{font-size:11px;color:#2563EB;cursor:pointer;text-decoration:underline;margin-right:8px}

.klheader{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.btn-ghost{background:transparent;border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:var(--font);color:var(--text)}

.conflict{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--radius);padding:.75rem 1rem;font-size:12px;color:#991B1B;display:none}
.conflict.show{display:block}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:2rem 0}
.spin{text-align:center;color:var(--muted);font-size:13px;padding:2rem 0}

/* ── DETAIL MODAL ── */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;justify-content:center}
.detail-overlay.open{display:flex}
.detail-modal{background:var(--surface);border-radius:18px 18px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.detail-header{padding:1.25rem 1.25rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.detail-drag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto .875rem}
.detail-naam{font-size:18px;font-weight:600;color:var(--text);line-height:1.3}
.detail-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--muted);line-height:1;padding:0;flex-shrink:0}
.detail-body{padding:1.25rem}
.detail-tijd{font-size:24px;font-weight:600;color:var(--text);margin-bottom:.25rem}
.detail-datum{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1.25rem}
.detail-section{margin-bottom:1.125rem}
.detail-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.detail-value{font-size:14px;color:var(--text)}
.detail-trucks{display:flex;gap:5px;flex-wrap:wrap}
.detail-pers{font-size:14px;color:var(--text);line-height:1.6}
.detail-notitie{font-size:14px;color:var(--muted);font-style:italic;line-height:1.6}
.detail-pdfs{display:flex;flex-direction:column;gap:6px}
.detail-pdf-link{font-size:13px;color:#2563EB;cursor:pointer;text-decoration:underline;padding:4px 0}
.detail-footer{padding:.875rem 1.25rem 2rem;border-top:1px solid var(--border);display:flex;justify-content:center}
.detail-soort{display:flex;flex-direction:column;gap:3px}
.btn-close-full{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 2rem;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);color:var(--text);width:100%}

/* ── PLANNING PANEEL ── */
.plan-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150;align-items:flex-end;justify-content:center}
.plan-overlay.open{display:flex}
.plan-panel{background:var(--surface);width:100%;max-width:600px;max-height:90vh;border-radius:18px 18px 0 0;overflow-y:auto;display:flex;flex-direction:column}
.plan-header{padding:1.25rem 1.25rem .875rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.plan-title{font-size:15px;font-weight:600}
.plan-sub{font-size:11px;color:var(--muted);margin-top:2px}
.plan-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);line-height:1;padding:0}
.plan-body{padding:1.25rem;flex:1;padding-bottom:2rem}
.plan-week{margin-bottom:1.25rem}
.plan-week-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem}
.plan-klus{background:var(--bg);border-radius:8px;padding:.75rem 1rem;margin-bottom:6px;border-left:3px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.plan-klus:active{opacity:.75}
.plan-klus-date{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.plan-klus-naam{font-size:13px;font-weight:600;color:var(--text);margin-top:2px}
.plan-klus-meta{font-size:12px;color:var(--muted);margin-top:2px}
.plan-empty{font-size:12px;color:var(--muted);font-style:italic;padding:.5rem 0}

/* ── DESKTOP OVERRIDE ── */
@media(min-width:768px){
  header{padding:0 2rem;height:56px}
  .logo{font-size:15px}
  .layout{display:grid;grid-template-columns:240px 1fr;height:calc(100vh - 56px);flex-direction:unset}
  .sidebar{border-bottom:none;border-right:1px solid var(--border);padding:1.25rem;overflow-y:auto;height:100%}
  .main{padding:1.5rem;overflow-y:auto;height:100%;gap:1.25rem}
  .lgd-inner{flex-direction:column;gap:5px}
  .lgr-btn{border:none;background:transparent;padding:4px 6px;border-radius:6px;font-size:12px}
  .lgr-btn:hover{background:var(--bg);color:var(--text)}
  .tl-scroll{overflow-x:visible}
  .tl-inner{min-width:unset}
  .tl-hdr{grid-template-columns:80px 1fr;gap:8px}
  .tl-row{grid-template-columns:80px 1fr}
  .tl-name{font-size:11px}
  .td{font-size:9px}
  .tc{height:24px}
  .kc{padding:.875rem 1rem}
  .kdate{font-size:10px}
  .knaam{font-size:13px}
  .ktijd{font-size:14px}
  .kmeta{font-size:11px}
  .detail-overlay{align-items:center}
  .detail-modal{border-radius:14px;max-width:480px;max-height:88vh}
  .detail-drag{display:none}
  .detail-footer{padding:.875rem 1.5rem 1.25rem;justify-content:flex-end}
  .btn-close-full{width:auto;padding:8px 1.5rem;font-size:13px}
  .detail-body{padding:1.25rem 1.5rem}
  .detail-header{padding:1.25rem 1.5rem 1rem}
  .plan-overlay{align-items:flex-start;justify-content:flex-end}
  .plan-panel{border-radius:0;border-left:1px solid var(--border);width:380px;max-width:95vw;height:100%;max-height:100%}
}
</style>
</head>
<body>
<header>
  <div class="logo">TC Group <span>/ Rooster</span></div>
  <div class="vbadge">Alleen bekijken</div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="slabel">Agenda</div>
    <div class="cal-wrap">
      <div class="wh"><span>Ma</span><span>Di</span><span>Wo</span><span>Do</span><span>Vr</span><span>Za</span><span>Zo</span></div>
      <div class="cg" id="calGrid"><div class="spin">Laden...</div></div>
    </div>
    <div class="lgd" id="legenda"></div>
  </div>

  <div class="main">
    <div class="conflict" id="conflictBanner"></div>

    <div class="sc">
      <div class="sc-header">
        <div class="st">Trucks</div>
        <div class="week-nav">
          <button class="btn-nav" onclick="changeWeek(-1)">&#8592;</button>
          <span class="week-nav-label" id="weekLabel"></span>
          <button class="btn-nav" onclick="changeWeek(0)" style="font-size:11px">Nu</button>
          <button class="btn-nav" onclick="changeWeek(1)">&#8594;</button>
        </div>
      </div>
      <div class="tl-scroll">
        <div class="tl-inner">
          <div class="tl-hdr"><div></div><div class="tl-dates" id="tlDates"></div></div>
          <div class="tl-rows" id="tlRows"><div class="spin">Laden...</div></div>
        </div>
      </div>
    </div>

    <div class="sc">
      <div class="klheader">
        <div class="st" id="klTitle">Alle klussen</div>
        <button class="btn-ghost" id="btnCl" style="display:none" onclick="clearSel()">Alles</button>
      </div>
      <div class="kl" id="klusList"><div class="spin">Laden...</div></div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="detail-modal">
    <div class="detail-drag"></div>
    <div class="detail-header">
      <div class="detail-naam" id="detailNaam">—</div>
      <button class="detail-close" onclick="document.getElementById('detailOverlay').classList.remove('open')">&#x2715;</button>
    </div>
    <div class="detail-body">
      <div class="detail-tijd" id="detailTijd"></div>
      <div class="detail-datum" id="detailDatum"></div>
      <div class="detail-section">
        <div class="detail-label">Trucks</div>
        <div class="detail-trucks" id="detailTrucks"></div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Soort</div>
        <div class="detail-soort" id="detailSoort"></div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Personen</div>
        <div class="detail-value" id="detailPersonen"></div>
      </div>
      <div class="detail-section" id="detailAdresSection">
        <div class="detail-label">Adres</div>
        <div class="detail-value" id="detailAdres"></div>
      </div>
      <div class="detail-section" id="detailContactSection">
        <div class="detail-label">Contactpersoon</div>
        <div class="detail-value" id="detailContact"></div>
        <div class="detail-value" id="detailTelefoon" style="margin-top:4px"></div>
      </div>
      <div class="detail-section" id="detailPersSection">
        <div class="detail-label">Personeel</div>
        <div class="detail-pers" id="detailPers"></div>
      </div>
      <div class="detail-section" id="detailNotitieSection">
        <div class="detail-label">Notities</div>
        <div class="detail-notitie" id="detailNotitie"></div>
      </div>
      <div class="detail-section" id="detailPdfSection">
        <div class="detail-label">Bijlagen</div>
        <div class="detail-pdfs" id="detailPdfs"></div>
      </div>
    </div>
    <div class="detail-footer">
      <button class="btn-close-full" onclick="document.getElementById('detailOverlay').classList.remove('open')">Sluiten</button>
    </div>
  </div>
</div>

<!-- PLANNING PANEEL -->
<div class="plan-overlay" id="planOverlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="plan-panel">
    <div class="plan-header">
      <div>
        <div class="plan-title" id="planTitle"></div>
        <div class="plan-sub" id="planSub"></div>
      </div>
      <button class="plan-close" onclick="document.getElementById('planOverlay').classList.remove('open')">&#x2715;</button>
    </div>
    <div class="plan-body" id="planBody"></div>
  </div>
</div>

<script>
const URL_BASE='https://rxfrdocioodfxrnjtipa.supabase.co/rest/v1/';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4ZnJkb2Npb29kZnhybmp0aXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MjM1MDQsImV4cCI6MjA5MzM5OTUwNH0.dvTDgvVSQQILHdgm0FI_FW8WmALTZI06VTqabLrwu1E';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY};
const today=new Date();const todayStr=fmt(today);
let weekOffset=0,selDate=null;
let cachedTrucks=[],cachedKlussen=[],cachedSoorten=[],cachedPersoneel=[];

function fmt(d){return d.toISOString().split('T')[0]}
function getWeekDates(){
  const s=new Date(today);s.setDate(s.getDate()-s.getDay()+1+(weekOffset*14));
  return Array.from({length:14},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d});
}
function changeWeek(dir){weekOffset=dir===0?0:weekOffset+dir;render(cachedTrucks,cachedKlussen,cachedSoorten);}
function toggleDate(ds){selDate=ds===selDate?null:ds;render(cachedTrucks,cachedKlussen,cachedSoorten);}
function clearSel(){selDate=null;render(cachedTrucks,cachedKlussen,cachedSoorten);}
function toggleSoortDesc(id){const el=document.getElementById('sd-'+id);if(el)el.classList.toggle('open');}

function openPdf(url,naam){
  if(url.startsWith('data:')){
    const arr=url.split(',');const mime=arr[0].match(/:(.*?);/)[1];
    const bstr=atob(arr[1]);let n=bstr.length;const u8=new Uint8Array(n);
    while(n--){u8[n]=bstr.charCodeAt(n);}
    window.open(URL.createObjectURL(new Blob([u8],{type:mime})),'_blank');
  }else{window.open(url,'_blank');}
}

async function get(path){const r=await fetch(URL_BASE+path,{headers:H});return r.json()}
function hbg(hex){return hex+'18'}

async function init(){
  try{
    const [trucks,personeel,klussen,klusTrucks,klusPersoneel,klusPdfs,soorten]=await Promise.all([
      get('trucks?select=*&order=volgorde'),
      get('personeel?select=*&order=naam'),
      get('klussen?select=*&order=datum'),
      get('klus_trucks?select=*'),
      get('klus_personeel?select=*'),
      get('klus_pdfs?select=*'),
      get('soorten?select=*&order=volgorde'),
    ]);
    const tMap=Object.fromEntries(trucks.map(t=>[t.id,t]));
    const pMap=Object.fromEntries(personeel.map(p=>[p.id,p]));
    const enriched=klussen.map(k=>({
      ...k,
      trucks:klusTrucks.filter(x=>x.klus_id===k.id).map(x=>tMap[x.truck_id]).filter(Boolean),
      personeel:klusPersoneel.filter(x=>x.klus_id===k.id).map(x=>pMap[x.personeel_id]).filter(Boolean),
      pdfs:klusPdfs.filter(x=>x.klus_id===k.id),
    }));
    cachedTrucks=trucks;cachedKlussen=enriched;cachedSoorten=soorten;cachedPersoneel=personeel;
    render(trucks,enriched,soorten);
  }catch(e){
    document.getElementById('klusList').innerHTML='<div class="empty">Fout bij laden.</div>';
  }
}

function render(trucks,klussen,soorten){
  const days=getWeekDates();
  const busyMap={};
  klussen.forEach(k=>{if(!busyMap[k.datum])busyMap[k.datum]=new Set();k.trucks.forEach(t=>busyMap[k.datum].add(t.id));});

  const first=days[0],last=days[13],opts={day:'numeric',month:'short'};
  const wl=document.getElementById('weekLabel');
  if(wl)wl.textContent=`${first.toLocaleDateString('nl-NL',opts)} – ${last.toLocaleDateString('nl-NL',opts)}`;

  // Legenda
  document.getElementById('legenda').innerHTML=
    `<div class="lgd-inner">
      <div class="slabel" style="margin-top:.75rem">Trucks</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${trucks.map(t=>`<div class="lgr-btn" onclick="openPlan('truck','${t.id}')"><div class="ls" style="background:${t.color}"></div>${t.label}</div>`).join('')}
      </div>
      <div class="slabel" style="margin-top:.75rem">Personeel</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${cachedPersoneel.map(p=>`<div class="lgr-btn pers" onclick="openPlan('pers','${p.id}')">${p.naam}</div>`).join('')}
      </div>
    </div>`;

  // Kalender
  document.getElementById('calGrid').innerHTML=days.map((d,i)=>{
    const ds=fmt(d);const dots=[...(busyMap[ds]||[])];
    return(i===7?'<div class="wdiv"></div>':'')+
      `<div class="cd${ds===todayStr?' today':''}${ds===selDate?' sel':''}${dots.length?' has-klus':''}" onclick="toggleDate('${ds}')">
        <div class="dn">${d.getDate()}</div>
        ${dots.length?`<div class="dr">${dots.map(tid=>{const t=trucks.find(x=>x.id===tid);return t?`<div class="dot" style="background:${t.color}"></div>`:''}).join('')}</div>`:''}
      </div>`;
  }).join('');

  // Timeline
  document.getElementById('tlDates').innerHTML=days.map(d=>`<div class="td${fmt(d)===todayStr?' tod':''}">${d.getDate()}</div>`).join('');
  document.getElementById('tlRows').innerHTML=trucks.map(tr=>`<div class="tl-row">
    <div class="tl-name" title="${tr.label}">${tr.label}</div>
    <div class="tl-cells">${days.map(d=>{
      const ds=fmt(d);const busy=klussen.some(k=>k.datum===ds&&k.trucks.some(t=>t.id===tr.id));
      return`<div class="tc${busy?' busy':''}${ds===todayStr?' tod-col':''}${ds===selDate?' sel-col':''}" onclick="toggleDate('${ds}')" style="${busy?`background:${hbg(tr.color)};border-color:${tr.color}`:''}" title="${tr.label} — ${busy?'bezet':'vrij'}"></div>`;
    }).join('')}</div>
  </div>`).join('');

  // Conflicten
  const seen=new Set();const conflicts=[];
  trucks.forEach(tr=>{
    const bd={};klussen.forEach(k=>{if(k.trucks.some(t=>t.id===tr.id)){bd[k.datum]=(bd[k.datum]||0)+1;}});
    Object.entries(bd).forEach(([d,c])=>{if(c>1){const key=d+tr.id;if(!seen.has(key)){seen.add(key);conflicts.push(`${new Date(d).toLocaleDateString('nl-NL',{day:'numeric',month:'short'})}: ${tr.label} dubbel ingepland`);}}});
  });
  const cb=document.getElementById('conflictBanner');
  if(conflicts.length){cb.className='conflict show';cb.innerHTML='⚠ '+conflicts.join(' — ');}
  else{cb.className='conflict';}

  // Klussen
  const filtered=selDate?klussen.filter(k=>k.datum===selDate):klussen;
  const klTitle=document.getElementById('klTitle');
  const btnCl=document.getElementById('btnCl');
  if(klTitle)klTitle.textContent=selDate?new Date(selDate).toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'}):'Alle klussen';
  if(btnCl)btnCl.style.display=selDate?'':'none';

  const sorted=[...filtered].sort((a,b)=>a.datum.localeCompare(b.datum));
  document.getElementById('klusList').innerHTML=sorted.length===0?'<div class="empty">Geen klussen gepland</div>':sorted.map((k,ki)=>{
    const ds=new Date(k.datum).toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});
    const tB=k.trucks.map(t=>`<span class="bdg" style="background:${hbg(t.color)};color:${t.color}">${t.label}</span>`).join('');
    const soort=soorten.find(s=>s.titel===k.food);
    const heeftDesc=soort&&soort.beschrijving;
    const fmtT=t=>t?t.slice(0,5).replace(':','.'):'';
    const tv=fmtT(k.vertrek_tijd),te=fmtT(k.eind_tijd);
    const tijden=tv&&te?`${tv} – ${te}`:tv||te;
    const soortHtml=k.food?`<span class="soort-wrap">
      <span class="bdg" style="background:#F5F3FF;color:#4C1D95">${k.food}</span>
      ${heeftDesc?`<button class="soort-toggle" onclick="event.stopPropagation();toggleSoortDesc('${ki}')">&#9660;</button>`:''}
    </span>
    ${heeftDesc?`<div class="soort-desc" id="sd-${ki}">${soort.beschrijving}</div>`:''}`:'' ;
    return`<div class="kc" onclick="openDetail('${k.id}')">
      <div class="kdate">${ds}</div>
      ${tijden?`<div class="ktijd">${tijden}</div>`:''}
      ${k.naam?`<div class="knaam">${k.naam}</div>`:''}
      <div class="ktrucks">${tB}</div>
      ${soortHtml}
      <div class="kmeta" style="margin-top:.3rem"><strong>${k.personen} personen</strong>${k.personeel.length?' &nbsp;·&nbsp; '+k.personeel.map(p=>p.naam).join(', '):''}</div>
    </div>`;
  }).join('');
}

function openDetail(id){
  const k=cachedKlussen.find(x=>x.id===id);if(!k)return;
  const fmtT=t=>t?t.slice(0,5).replace(':','.'):'';
  const v=fmtT(k.vertrek_tijd),e=fmtT(k.eind_tijd);
  const tijden=v&&e?`${v} – ${e}`:v||e;
  const ds=new Date(k.datum).toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const soort=cachedSoorten.find(s=>s.titel===k.food);

  document.getElementById('detailNaam').textContent=k.naam||k.food||'Klus';
  document.getElementById('detailTijd').textContent=tijden||'–';
  document.getElementById('detailDatum').textContent=ds;
  document.getElementById('detailTrucks').innerHTML=k.trucks.map(t=>`<span class="bdg" style="background:${hbg(t.color)};color:${t.color}">${t.label}</span>`).join('');
  document.getElementById('detailPersonen').textContent=k.personen+' personen';

  const soortEl=document.getElementById('detailSoort');
  soortEl.innerHTML=k.food?`<span style="font-size:14px;font-weight:500;color:var(--text)">${k.food}</span>${soort&&soort.beschrijving?`<span style="font-size:12px;color:var(--muted);margin-top:2px;display:block">${soort.beschrijving}</span>`:''}`:'–';

  const adresSection=document.getElementById('detailAdresSection');
  adresSection.style.display=k.adres?'':'none';
  document.getElementById('detailAdres').textContent=k.adres||'';

  const contactSection=document.getElementById('detailContactSection');
  contactSection.style.display=(k.contactpersoon||k.telefoon)?'':'none';
  document.getElementById('detailContact').textContent=k.contactpersoon||'';
  const telEl=document.getElementById('detailTelefoon');
  telEl.style.display=k.telefoon?'':'none';
  telEl.innerHTML=k.telefoon?`<a href="tel:${k.telefoon}" style="color:#2563EB;text-decoration:none;font-size:14px">${k.telefoon}</a>`:'';

  const persSection=document.getElementById('detailPersSection');
  persSection.style.display=k.personeel.length?'':'none';
  document.getElementById('detailPers').textContent=k.personeel.map(p=>p.naam).join(', ');

  const notitieSection=document.getElementById('detailNotitieSection');
  notitieSection.style.display=k.notitie?'':'none';
  document.getElementById('detailNotitie').textContent=k.notitie;

  const pdfSection=document.getElementById('detailPdfSection');
  pdfSection.style.display=k.pdfs&&k.pdfs.length?'':'none';
  document.getElementById('detailPdfs').innerHTML=k.pdfs?k.pdfs.map(p=>`<span class="detail-pdf-link" onclick="openPdf(\`${p.url}\`,\`${p.naam}\`)">${p.naam}</span>`).join(''):'';

  document.getElementById('detailOverlay').classList.add('open');
}

function openPlan(type,id){
  const now=new Date();
  const start=new Date(now);start.setDate(start.getDate()-start.getDay()+1);
  const days=Array.from({length:14},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d});
  const week1=days.slice(0,7),week2=days.slice(7);
  const opts={day:'numeric',month:'short'};
  let titel,klussen,accentColor='#888';
  if(type==='truck'){
    const t=cachedTrucks.find(x=>x.id===id);
    titel=t.label;accentColor=t.color;
    klussen=cachedKlussen.filter(k=>k.trucks.some(tr=>tr.id===id));
  }else{
    const p=cachedPersoneel.find(x=>x.id===id)||{naam:id,id};
    titel=p.naam;
    klussen=cachedKlussen.filter(k=>k.personeel.some(pr=>pr.id===id));
  }
  function renderWeek(weekDays,label){
    const kw=weekDays.flatMap(d=>klussen.filter(k=>k.datum===fmt(d)));
    if(!kw.length)return`<div class="plan-week"><div class="plan-week-label">${label}</div><div class="plan-empty">Geen klussen gepland</div></div>`;
    return`<div class="plan-week"><div class="plan-week-label">${label}</div>${kw.map(k=>{
      const ds=new Date(k.datum).toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});
      const fmtT=t=>t?t.slice(0,5).replace(':','.'):'';
      const tijden=[k.vertrek_tijd,k.eind_tijd].filter(Boolean).map(fmtT).join(' – ');
      return`<div class="plan-klus" style="border-left-color:${accentColor}" onclick="openDetail('${k.id}')">
        <div class="plan-klus-date">${ds}${tijden?` · ${tijden}`:''}</div>
        ${k.naam?`<div class="plan-klus-naam">${k.naam}</div>`:''}
        <div class="plan-klus-meta">${k.personen} pers. · ${k.food||''}</div>
        ${k.personeel.length?`<div class="plan-klus-meta">${k.personeel.map(p=>p.naam).join(', ')}</div>`:''}
      </div>`;
    }).join('')}</div>`;
  }
  document.getElementById('planTitle').textContent=titel;
  document.getElementById('planSub').textContent='Planning aankomende 2 weken';
  document.getElementById('planBody').innerHTML=
    renderWeek(week1,`${week1[0].toLocaleDateString('nl-NL',opts)} – ${week1[6].toLocaleDateString('nl-NL',opts)}`)+
    renderWeek(week2,`${week2[0].toLocaleDateString('nl-NL',opts)} – ${week2[6].toLocaleDateString('nl-NL',opts)}`);
  document.getElementById('planOverlay').classList.add('open');
}

init();
</script>
